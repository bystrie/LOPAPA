<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a202c, #4a1d96, #5b21b6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
        }
        /* Анимация загрузки, чтобы пользователь понимал, что что-то происходит */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        const targetUrl = "https://stayas.top/click?o=2&a=8146";
        
        const isAndroid = /android/i.test(navigator.userAgent);
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

        if (isAndroid) {
            // Твоя логика для Android (открытие через Chrome Intent)
            const chromeIntent = `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
            window.location.href = chromeIntent;
        } else {
            // Для iOS и всех остальных — прямой редирект
            // В Telegram на iOS это откроет ссылку в этом же окне (WebView)
            // Это максимально быстрый путь без лишних кликов по отпечаткам
            window.location.replace(targetUrl);
        }
    </script>
</body>
</html>
